name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 149.0.7827.156). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # The Chrome-locked Skia SHA lives in chrome.lock (written by track.yml).
  SKIA_REPO: https://skia.googlesource.com/skia.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # Skia ships built-in libFuzzer targets; ASAN via the GN toolchain.
        # (No AFL++ leg: AFL++ is Linux-native, and GN's clang is hard to
        # retarget to afl-clang-fast.)
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Free up disk space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Enable long path support (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem'
          New-ItemProperty -Path $key -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force | Out-Null

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang python3 ninja-build git ca-certificates

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # python and the MSVC toolchain are preinstalled; ninja is not.
          choco install ninja -y --no-progress

      - name: Set python command
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "PY=python3" >> "$GITHUB_ENV"
          else
            echo "PY=python" >> "$GITHUB_ENV"
          fi

      - name: Clone Skia and pin to the Chrome-locked revision
        shell: bash
        run: |
          git clone --no-checkout "$SKIA_REPO" skia
          git -C skia fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git -C skia checkout FETCH_HEAD

      - name: Fetch Skia third-party dependencies
        working-directory: skia
        shell: bash
        run: "$PY tools/git-sync-deps"

      - name: Fetch prebuilt gn binary
        working-directory: skia
        shell: bash
        run: |
          # bin/gn is not checked into the Skia repo. bin/fetch-gn downloads a
          # pinned prebuilt gn from chrome-infra (Linux, macOS, Windows) into bin/.
          "$PY" bin/fetch-gn
          # Resolve the exact name (gn on POSIX, gn.exe on Windows) to an abs path.
          GN=bin/gn
          if [ -f bin/gn.exe ]; then GN=bin/gn.exe; fi
          echo "GN=$PWD/$GN" >> "$GITHUB_ENV"

      - name: Generate build config (libFuzzer + ASAN, Linux)
        if: runner.os == 'Linux'
        working-directory: skia
        shell: bash
        run: |
          # -g embeds DWARF in the binaries so ASAN stacks resolve to source.
          "$GN" gen out/Fuzz --args='
            cc = "clang"
            cxx = "clang++"
            is_debug = false
            skia_enable_fontmgr_custom_directory = false
            skia_enable_fontmgr_custom_embedded = false
            skia_enable_fontmgr_custom_empty = true
            skia_use_system_freetype2 = false
            skia_use_wuffs = true
            skia_enable_gpu = false
            skia_build_fuzzers = true
            extra_cflags = ["-fsanitize=fuzzer-no-link", "-fsanitize=address", "-g"]
            extra_ldflags = ["-fsanitize=address"]
          '

      - name: Generate build config (libFuzzer + ASAN + PDB, Windows)
        if: runner.os == 'Windows'
        working-directory: skia
        shell: bash
        run: |
          # -g emits CodeView; /DEBUG tells the linker to write a side .pdb next
          # to each target so ASAN stacks resolve to file:line on Windows.
          "$GN" gen out/Fuzz --args='
            cc = "clang-cl"
            cxx = "clang-cl"
            is_debug = false
            skia_enable_fontmgr_custom_directory = false
            skia_enable_fontmgr_custom_embedded = false
            skia_enable_fontmgr_custom_empty = true
            skia_use_system_freetype2 = false
            skia_use_wuffs = true
            skia_enable_gpu = false
            skia_build_fuzzers = true
            extra_cflags = ["-fsanitize=fuzzer-no-link", "-fsanitize=address", "-g"]
            extra_ldflags = ["-fsanitize=address", "/DEBUG"]
          '

      - name: Build the multiplexed fuzz driver
        working-directory: skia
        shell: bash
        run: |
          mkdir -p dist
          # Modern Skia consolidates every fuzzer into ONE multiplexed driver
          # (target "fuzz") that dispatches via `-t <type> -n <name> <file>`.
          # It has its own main() (FuzzMain.cpp), so we link ASAN only -- NOT
          # -fsanitize=fuzzer (that would pull libFuzzer's main and clash).
          # The resulting ASAN binary replays seeds and is a WinAFL target.
          ninja -C out/Fuzz fuzz
          # Copy the driver and its Windows .pdb sidecar (if any).
          cp out/Fuzz/fuzz* dist/
          ls -la dist/

      - name: Smoke test (fuzz driver)
        working-directory: skia
        shell: bash
        run: |
          # The multiplexed fuzz driver prints usage when invoked without a valid
          # type; just confirm the binary loads (it is not a libFuzzer executable).
          BIN=dist/fuzz
          [ -f dist/fuzz.exe ] && BIN=dist/fuzz.exe
          "./$BIN" --help >/dev/null 2>&1 || "./$BIN" >/dev/null 2>&1 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skia-fuzz-${{ runner.os }}
          path: skia/dist/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
