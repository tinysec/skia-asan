name: build

on:
  push:
    tags: ["v*", "skia-*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. skia-9f330f17."
        required: false

env:
  # The Chrome-locked Skia SHA lives in chrome.lock (written by track.yml).
  SKIA_REPO: https://skia.googlesource.com/skia.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # Skia ships built-in libFuzzer targets; ASAN via the GN toolchain.
        # (No AFL++ leg: AFL++ is Linux-native, and GN's clang is hard to
        # retarget to afl-clang-fast.)
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Free up disk space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Enable long path support (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem'
          New-ItemProperty -Path $key -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force | Out-Null

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libgl1-mesa-dev / libglu1-mesa-dev provide GL/gl.h and GL/glx.h.
          # Skia compiles src/gpu/ganesh/gl/glx/GrGLMakeGLXInterface.cpp even
          # with skia_enable_gpu=false, and the free-disk-space step removes the
          # mesa DRI runtime, so the dev headers must be (re)installed here.
          sudo apt-get install -y --no-install-recommends \
            build-essential clang python3 ninja-build git ca-certificates \
            libfontconfig1-dev libgl1-mesa-dev libglu1-mesa-dev
          # The fuzz driver links with -fsanitize=address, which needs the
          # clang ASAN runtime archives (libclang_rt.asan*.a). The apt 'clang'
          # package ships clang itself but NOT the runtime -- it is split into
          # a separate libclang-rt-<v>-dev package -- so install the runtime
          # package matching the installed clang version, else the fuzz link
          # fails with 'cannot find .../libclang_rt.asan-x86_64.a'.
          CLANG_MAJOR=$(clang -dumpversion | cut -d. -f1)
          sudo apt-get install -y --no-install-recommends "libclang-rt-${CLANG_MAJOR}-dev"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # python and the MSVC toolchain are preinstalled; ninja is not.
          choco install ninja -y --no-progress

      - name: Set python command
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "PY=python3" >> "$GITHUB_ENV"
          else
            echo "PY=python" >> "$GITHUB_ENV"
          fi

      - name: Clone Skia and pin to the Chrome-locked revision
        shell: bash
        run: |
          git clone --no-checkout "$SKIA_REPO" skia
          git -C skia fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git -C skia checkout FETCH_HEAD

      - name: Fetch Skia third-party dependencies
        working-directory: skia
        shell: bash
        run: "$PY tools/git-sync-deps"

      - name: Fetch prebuilt gn binary
        working-directory: skia
        shell: bash
        run: |
          # bin/gn is not checked into the Skia repo. bin/fetch-gn downloads a
          # pinned prebuilt gn from chrome-infra (Linux, macOS, Windows) into bin/.
          "$PY" bin/fetch-gn
          # Resolve the exact name (gn on POSIX, gn.exe on Windows) to an abs path.
          GN=bin/gn
          if [ -f bin/gn.exe ]; then GN=bin/gn.exe; fi
          echo "GN=$PWD/$GN" >> "$GITHUB_ENV"

      - name: Generate build config (ASAN + coverage, Linux)
        if: runner.os == 'Linux'
        working-directory: skia
        shell: bash
        run: |
          # One GN config builds BOTH the `skia` static library and the `fuzz`
          # driver from the same object tree. -g embeds DWARF for ASAN stacks.
          # fuzzer-no-link adds SanitizerCoverage so the lib is useful to a
          # libFuzzer/AFL++ harness; the `fuzz` driver has its own main(), so we
          # link ASAN only (NOT -fsanitize=fuzzer -- that would clash with main).
          "$GN" gen out/Fuzz --args='
            cc = "clang"
            cxx = "clang++"
            is_debug = false
            is_clang = true
            skia_enable_fontmgr_custom_directory = false
            skia_enable_fontmgr_custom_embedded = false
            skia_enable_fontmgr_custom_empty = true
            skia_use_system_freetype2 = false
            skia_use_wuffs = true
            skia_enable_gpu = false
            skia_build_fuzzers = true
            extra_cflags = ["-fsanitize=fuzzer-no-link", "-fsanitize=address", "-g"]
            extra_ldflags = ["-fsanitize=address"]
          '

      - name: Generate build config (ASAN + coverage, Windows)
        if: runner.os == 'Windows'
        working-directory: skia
        shell: bash
        run: |
          # -g emits CodeView; /DEBUG writes a side .pdb so ASAN stacks resolve
          # to file:line. clang-cl + /MT (GN static-CRT default) is the required
          # combo for clang-cl ASAN on Windows.
          # NOTE: skia_build_fuzzers is Linux-only. On Windows Skia's GN leaves
          # is_clang=false (the is_clang arg does not override for the MSVC-ABI
          # toolchain), so skia_build_fuzzers=true trips `assert(is_clang)` in
          # BUILD.gn. Windows therefore ships the `skia` ASAN static library
          # only -- which is the correct artifact for WinAFL anyway (link it
          # into your own harness). SanitizerCoverage stays on via fuzzer-no-link
          # so a downstream libFuzzer/WinAFL harness still gets coverage.
          "$GN" gen out/Fuzz --args='
            cc = "clang-cl"
            cxx = "clang-cl"
            is_debug = false
            is_clang = true
            skia_enable_fontmgr_custom_directory = false
            skia_enable_fontmgr_custom_embedded = false
            skia_enable_fontmgr_custom_empty = true
            skia_use_system_freetype2 = false
            skia_use_wuffs = true
            skia_enable_gpu = false
            extra_cflags = ["-fsanitize=fuzzer-no-link", "-fsanitize=address", "-g"]
            extra_ldflags = ["-fsanitize=address", "/DEBUG"]
          '

      - name: Build Skia static library + fuzz driver
        working-directory: skia
        shell: bash
        run: |
          mkdir -p dist/lib/include dist/fuzz
          # `skia` is the static library (libskia.a / skia.lib) -- the primary
          # ASAN artifact on BOTH platforms (link into your own harness).
          # `fuzz` is the multiplexed fuzz driver (own main(), replays seeds) and
          # is built on Linux only: on Windows Skia's GN leaves is_clang=false,
          # so the fuzz-driver targets (assert(is_clang)) are unavailable there.
          # NOTE: `fuzz` is an ASAN fuzz EXECUTABLE, not a libFuzzer-engine
          # binary -- a true libFuzzer skia target needs extra GN work.
          ninja -C out/Fuzz skia
          if [ "$RUNNER_OS" = "Linux" ]; then
            ninja -C out/Fuzz fuzz
          fi

          # Diagnostic: list the build root so the fuzz driver's actual path
          # is visible in the log. Past runs linked fuzz ([715/715] link fuzz)
          # yet the copy below found nothing at out/Fuzz/fuzz -- this listing
          # removes the guesswork if that ever recurs.
          echo "--- out/Fuzz root contents ---"
          ls -la out/Fuzz | head -80

          find out/Fuzz -maxdepth 1 -type f \
            \( -name 'libskia.a' -o -name 'skia.lib' -o -name 'libskia*.pdb' \) \
            -exec cp {} dist/lib/ \;

          # The fuzz driver is Linux-only. `link fuzz` succeeds but the binary
          # is not guaranteed to sit at out/Fuzz/fuzz (maxdepth 1) on every
          # skia revision, so search the WHOLE build tree instead of assuming
          # the root path, and echo every match for traceability.
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "--- fuzz candidates anywhere under out/Fuzz ---"
            find out/Fuzz -type f \( -name 'fuzz' -o -name 'fuzz.exe' \) -ls
            find out/Fuzz -type f \( -name 'fuzz' -o -name 'fuzz.exe' \) \
              -exec cp {} dist/fuzz/ \;
            find out/Fuzz -type f -name 'fuzz*.pdb' \
              -exec cp {} dist/fuzz/ \; 2>/dev/null || true
          fi

          # Public headers live under include/.
          cp -r include/* dist/lib/include/ 2>/dev/null || true
          ls -la dist/lib dist/fuzz

      - name: Verify artifacts
        working-directory: skia
        shell: bash
        run: |
          STAT=$(find dist/lib -maxdepth 1 -type f \( -name 'libskia.a' -o -name 'skia.lib' \) | head -1)
          test -n "$STAT" || { echo "ERROR: libskia missing"; exit 1; }
          echo "static-lib: $STAT"
          # The fuzz driver is Linux-only (see build step comment).
          if [ "$RUNNER_OS" = "Linux" ]; then
            FZ=$(find dist/fuzz -maxdepth 1 -type f -name 'fuzz' | head -1)
            test -n "$FZ" || { echo "ERROR: fuzz driver missing"; exit 1; }
            echo "fuzz-driver: $FZ"
          else
            echo "fuzz-driver: (skipped on Windows -- skia GN asserts is_clang)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skia-asan-${{ runner.os }}
          path: skia/dist
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack each artifact into a zip
        # GitHub release assets are FLAT: a file's release path is just its
        # basename and the directory structure is stripped. That breaks a direct
        # upload of Skia's artifact in two ways:
        #   1. intra-artifact duplicate basenames -- Skia's include/ tree ships
        #      hundreds of BUILD.bazel / OWNERS / vululkan_structs.hpp files
        #      repeated across subdirs. A flat upload collapses them into one
        #      asset (later upload wins), and softprops 404s on the stale
        #      metadata update ("error updating release asset metadata ...
        #      Not Found"), which FAILS the release job.
        #   2. cross-artifact duplicate basenames -- both legs ship the SAME
        #      public headers (SkCanvas.h etc.), which collide when both
        #      artifacts are uploaded flat.
        # Packing each artifact into ONE per-platform zip sidesteps both:
        # every asset gets a unique name, and the lib/ + include/ + fuzz/ tree
        # the consumer needs is preserved inside the archive.
        run: |
          mkdir -p out
          for d in artifacts/*/; do
            name=$(basename "$d")
            (cd artifacts && zip -rq "../out/${name}-${{ steps.tag.outputs.tag }}.zip" "$name")
          done
          echo "--- release zips ---"
          ls -la out

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: out/*.zip
